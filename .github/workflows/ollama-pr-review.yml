name: 'Ollama Code Review'

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: '${{ github.workflow }}-${{ github.event.pull_request.number }}'
  cancel-in-progress: true

jobs:
  ollama-review:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: 'read'
      pull-requests: 'write'
    steps:
      - name: 'Checkout repository'
        uses: 'actions/checkout@v4'

      - name: 'Run Ollama Code Review'
        uses: 'ray5273/ollama-pr-review-action@main'
        with:
          OLLAMA_API_URL: 'https://valued-learned-reflect-introduce.trycloudflare.com'
          MY_GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
          OWNER: '${{ github.repository_owner }}'
          REPO: '${{ github.event.repository.name }}'
          PR_NUMBER: '${{ github.event.pull_request.number }}'
          MODEL: 'glm-5:cloud'
          CUSTOM_PROMPT: 'You are an accessibility (a11y) expert reviewer. Review the code ONLY for accessibility issues based on WCAG 2.1 and WCAG 2.2 guidelines. Focus on: semantic HTML, ARIA attributes, keyboard navigation, focus management, color contrast, text alternatives for images, form labels, heading hierarchy, touch target sizes (WCAG 2.2), focus appearance (WCAG 2.2), and dragging alternatives (WCAG 2.2). Ignore all non-accessibility concerns like code style, performance, or general best practices. For each issue, reference the specific WCAG success criterion (e.g. SC 1.1.1, SC 2.4.7). CRITICAL: Return ONLY raw JSON. Do NOT wrap in markdown code blocks. No ```json``` tags. Output must start with { and end with }.'
