name: 'Ollama Code Review'

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: '${{ github.workflow }}-${{ github.event.pull_request.number }}'
  cancel-in-progress: true

jobs:
  ollama-review:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: 'read'
      pull-requests: 'write'
    steps:
      - name: 'Checkout repository'
        uses: 'actions/checkout@v4'

      - name: 'Run Ollama Code Review'
        uses: './.github/actions/ollama-pr-review'
        with:
          OLLAMA_API_URL: 'https://mountains-freedom-confidential-presents.trycloudflare.com'
          MY_GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
          OWNER: '${{ github.repository_owner }}'
          REPO: '${{ github.event.repository.name }}'
          PR_NUMBER: '${{ github.event.pull_request.number }}'
          MODEL: 'glm-5:cloud'
          CUSTOM_PROMPT: 'You are an accessibility (a11y) expert reviewer. Review the code ONLY for accessibility issues based on WCAG 2.1 and WCAG 2.2 guidelines. Focus on: semantic HTML, ARIA attributes, keyboard navigation, focus management, color contrast, text alternatives for images, form labels, heading hierarchy, touch target sizes (WCAG 2.2), focus appearance (WCAG 2.2), and dragging alternatives (WCAG 2.2). Ignore all non-accessibility concerns. For each issue, reference the specific WCAG success criterion (e.g. SC 1.1.1, SC 2.4.7) in the feedback title. Make sure the top-level JSON has a "reviews" array field.'
