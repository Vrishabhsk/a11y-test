name: '♿ Gemini A11y Pull Request Review'

on:
  pull_request:
    types:
      - 'opened'
      - 'synchronize'

concurrency:
  group: '${{ github.workflow }}-review-${{ github.event.pull_request.number }}'
  cancel-in-progress: true

defaults:
  run:
    shell: 'bash'

jobs:
  review:
    runs-on: 'ubuntu-latest'
    timeout-minutes: 10
    permissions:
      contents: 'read'
      pull-requests: 'write'
    steps:
      - name: 'Checkout repository'
        uses: 'actions/checkout@v4'
        with:
          fetch-depth: 0

      - name: 'Get changed files'
        id: 'changed_files'
        run: |
          FILES=$(git diff --name-only --diff-filter=ACM origin/${{ github.base_ref }}...HEAD 2>/dev/null || git diff --name-only --diff-filter=ACM HEAD~1)
          echo "files=$FILES" >> $GITHUB_OUTPUT
          echo "Changed files:"
          echo "$FILES"

      - name: 'Run Gemini A11y Review'
        id: 'gemini_review'
        uses: 'google-github-actions/run-gemini-cli@v0'
        env:
          GEMINI_API_KEY: '${{ secrets.GEMINI_API_KEY }}'
        with:
          gemini_api_key: '${{ secrets.GEMINI_API_KEY }}'
          gemini_cli_version: 'latest'
          workflow_name: 'gemini-a11y-review'
          prompt: |
            Analyze the files: ${{ steps.changed_files.outputs.files }} for WCAG 2.1/2.2 Level A and AA accessibility violations.
            
            Check for: missing alt text, form inputs without labels, links without href, buttons without type, tables without headers, keyboard inaccessible elements, low contrast, missing ARIA, empty headings, multiple H1, unmarked new window links.
            
            IMPORTANT: Respond with ONLY valid JSON in this exact format:
            {"response": "## Accessibility Review Results\n\n### Issue 1\n- **File**: filename.ext\n- **Line**: approximate line number\n- **Issue**: description\n- **Code**: `code snippet`\n- **Fix**: how to fix\n\n### Issue 2\n..."}
            
            If no issues found, respond with: {"response": "No accessibility violations found in the changed files."}

      - name: 'Post review as PR comment'
        if: always()
        env:
          GH_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
          PR_NUMBER: '${{ github.event.pull_request.number }}'
          GEMINI_RESPONSE: '${{ steps.gemini_review.outputs.summary }}'
        run: |
          if [ -n "$GEMINI_RESPONSE" ] && [ "$GEMINI_RESPONSE" != "" ]; then
            echo "## ♿ Accessibility Review Results" > /tmp/comment.md
            echo "" >> /tmp/comment.md
            echo "$GEMINI_RESPONSE" >> /tmp/comment.md
            
            gh pr comment "$PR_NUMBER" --body-file /tmp/comment.md --repo "${{ github.repository }}" || echo "Could not post comment"
          else
            echo "No response from Gemini to post"
            echo "Debug: gemini_response was empty"
          fi
