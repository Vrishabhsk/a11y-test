name: '♿ Gemini A11y Pull Request Review'

on:
  pull_request:
    types:
      - 'opened'
      - 'synchronize'

concurrency:
  group: '${{ github.workflow }}-review-${{ github.event.pull_request.number }}'
  cancel-in-progress: true

defaults:
  run:
    shell: 'bash'

jobs:
  review:
    runs-on: 'ubuntu-latest'
    timeout-minutes: 10
    permissions:
      contents: 'read'
      pull-requests: 'write'
    steps:
      - name: 'Checkout repository'
        uses: 'actions/checkout@v4'
        with:
          fetch-depth: 0

      - name: 'Get changed files'
        id: 'changed_files'
        run: |
          FILES=$(git diff --name-only --diff-filter=ACM origin/${{ github.base_ref }}...HEAD 2>/dev/null || git diff --name-only --diff-filter=ACM HEAD~1)
          echo "files=$FILES" >> $GITHUB_OUTPUT
          echo "Changed files:"
          echo "$FILES"

      - name: 'Run Gemini A11y Review'
        id: 'gemini_review'
        uses: 'google-github-actions/run-gemini-cli@v0'
        env:
          GEMINI_API_KEY: '${{ secrets.GEMINI_API_KEY }}'
        with:
          gemini_api_key: '${{ secrets.GEMINI_API_KEY }}'
          gemini_cli_version: 'latest'
          workflow_name: 'gemini-a11y-review'
          prompt: |
            You are a WCAG 2.1 and 2.2 accessibility expert. Review the changed files in this pull request for accessibility violations.
            
            Files changed: ${{ steps.changed_files.outputs.files }}
            
            Check for these WCAG Level A and AA accessibility issues:
            - Images missing alt text
            - Form inputs without labels
            - Links without href attributes
            - Buttons without type attributes
            - Tables without proper headers
            - Interactive elements without keyboard support
            - Low contrast text
            - Missing ARIA labels
            - Empty headings
            - Multiple H1 tags
            - Links opening in new tabs without warning
            - Required fields not indicated
            
            For each issue found:
            1. File name
            2. Description of the problem
            3. Code snippet showing the issue
            4. How to fix it
            
            Format response in Markdown. Only report actual issues.

      - name: 'Post review as PR comment'
        if: always()
        env:
          GH_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
          PR_NUMBER: '${{ github.event.pull_request.number }}'
          GEMINI_RESPONSE: '${{ steps.gemini_review.outputs.summary }}'
        run: |
          if [ -n "$GEMINI_RESPONSE" ]; then
            echo "## ♿ Accessibility Review Results" > /tmp/comment.md
            echo "" >> /tmp/comment.md
            echo "$GEMINI_RESPONSE" >> /tmp/comment.md
            
            gh pr comment "$PR_NUMBER" --body-file /tmp/comment.md --repo "${{ github.repository }}" || echo "Could not post comment"
          else
            echo "No response from Gemini to post"
          fi
