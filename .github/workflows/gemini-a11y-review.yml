name: Gemini A11y Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]

jobs:
  gemini-a11y-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Get changed files
      id: changed-files
      run: |
        if [ "${{ github.event_name }}" == "pull_request" ]; then
          echo "files=$(git diff --name-only --diff-filter=ACM origin/${{ github.base_ref }}...HEAD | grep -E '\.(html|htm|jsx|tsx|vue|php|py|js|ts)$' | tr '\n' ' ')" >> $GITHUB_OUTPUT
        else
          echo "files=" >> $GITHUB_OUTPUT
        fi
    
    - name: Run Gemini A11y Review
      if: steps.changed-files.outputs.files != ''
      uses: google-github-actions/run-gemini-cli@v1
      with:
        gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
        prompt: |
          You are an expert accessibility (a11y) auditor reviewing code changes in a pull request.
          
          Your task is to analyze the changed files for accessibility violations including:
          - Images without alt text
          - Form inputs without labels
          - Links without href attributes
          - Buttons without type attributes
          - Tables without proper headers
          - Clickable elements without keyboard support
          - Low contrast text
          - Missing ARIA labels
          - Empty headings
          - Multiple H1 tags
          - Required fields not indicated
          
          For each violation found:
          1. Identify the file and line number
          2. Describe the violation
          3. Explain why it's an accessibility issue
          4. Provide a code example of how to fix it
          
          Be thorough but concise. Focus on WCAG 2.1 Level A and AA violations.
          
          Changed files to review: ${{ steps.changed-files.outputs.files }}
          
          Please review these files and provide your findings.
        github_token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Post Review Comment
      if: steps.changed-files.outputs.files != ''
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const path = require('path');
          
          // Read the Gemini output
          const outputPath = path.join(process.env.GITHUB_WORKSPACE, '.gemini', 'output.md');
          let reviewContent = '';
          
          if (fs.existsSync(outputPath)) {
            reviewContent = fs.readFileSync(outputPath, 'utf8');
          } else {
            reviewContent = 'Gemini accessibility review completed. No output file found.';
          }
          
          // Post as PR comment
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `## ♿ Gemini Accessibility Review\n\n${reviewContent}`
          });

  # Manual trigger via comment
  manual-a11y-review:
    runs-on: ubuntu-latest
    if: github.event.issue.pull_request && contains(github.event.comment.body, '@gemini-a11y')
    permissions:
      contents: read
      pull-requests: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Get PR files
      id: pr-files
      run: |
        gh pr view ${{ github.event.issue.number }} --json files --jq '.files[].path' | grep -E '\.(html|htm|jsx|tsx|vue|php|py|js|ts)$' | tr '\n' ' ' > files.txt
        echo "files=$(cat files.txt)" >> $GITHUB_OUTPUT
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Run Gemini A11y Review
      if: steps.pr-files.outputs.files != ''
      uses: google-github-actions/run-gemini-cli@v1
      with:
        gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
        prompt: |
          You are an expert accessibility (a11y) auditor reviewing code changes.
          
          Review these files for accessibility violations:
          WCAG 2.1 Level A and AA compliance
          - Images without alt text
          - Form inputs without labels
          - Links without href
          - Buttons without type
          - Tables without headers
          - Clickable elements without keyboard support
          - Low contrast text
          - Missing ARIA labels
          - Empty headings
          - Multiple H1 tags
          
          Files: ${{ steps.pr-files.outputs.files }}
          
          Provide specific line numbers and fix suggestions.
        github_token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Post Manual Review Comment
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const path = require('path');
          
          const outputPath = path.join(process.env.GITHUB_WORKSPACE, '.gemini', 'output.md');
          let reviewContent = '';
          
          if (fs.existsSync(outputPath)) {
            reviewContent = fs.readFileSync(outputPath, 'utf8');
          } else {
            reviewContent = 'Manual accessibility review completed.';
          }
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `## ♿ Manual Gemini Accessibility Review\n\n${reviewContent}`
          });
