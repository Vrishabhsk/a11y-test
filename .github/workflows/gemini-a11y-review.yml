name: 'Gemini A11y Review'

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: '${{ github.workflow }}-${{ github.event.pull_request.number }}'
  cancel-in-progress: true

jobs:
  gemini-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: 'read'
      pull-requests: 'write'
      issues: 'write'
    steps:
      - name: 'Checkout repository'
        uses: 'actions/checkout@v4'

      - name: 'Run Gemini A11y Review'
        uses: 'google-github-actions/run-gemini-cli@v0'
        env:
          GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
          PULL_REQUEST_NUMBER: '${{ github.event.pull_request.number }}'
          REPOSITORY: '${{ github.repository }}'
          ISSUE_TITLE: '${{ github.event.pull_request.title }}'
          ISSUE_BODY: '${{ github.event.pull_request.body }}'
        with:
          gemini_api_key: '${{ secrets.GEMINI_API_KEY }}'
          gemini_model: 'gemini-2.0-flash'
          workflow_name: 'gemini-a11y-review'
          github_pr_number: '${{ github.event.pull_request.number }}'
          upload_artifacts: true
          settings: |-
            {
              "sandbox": {
                "allowedCommands": ["cat", "echo", "grep", "head", "tail", "find", "ls", "wc"]
              }
            }
          prompt: |-
            You are an expert web accessibility (a11y) reviewer. Your ONLY job is to review
            pull request code changes for accessibility violations against WCAG 2.1 and WCAG 2.2 guidelines.

            ## Your Task

            1. Use the available tools to fetch the pull request diff for PR #${{ github.event.pull_request.number }}
               in the repository ${{ github.repository }}.
            2. Analyze ONLY the changed lines for accessibility issues.
            3. Post your review directly to the pull request using the GitHub API tools.

            ## What to Review

            Focus EXCLUSIVELY on accessibility issues:
            - Missing or incorrect alt text on images (SC 1.1.1)
            - Missing form labels or label associations (SC 1.3.1, SC 4.1.2)
            - Heading hierarchy violations (SC 1.3.1)
            - Semantic HTML misuse - divs instead of proper elements like nav, header, footer, main, button (SC 1.3.1)
            - Missing ARIA attributes on interactive widgets (SC 4.1.2)
            - Keyboard inaccessibility - click handlers without keyboard support (SC 2.1.1)
            - Missing focus management and focus indicators (SC 2.4.7, SC 2.4.11 WCAG 2.2)
            - Color contrast issues (SC 1.4.3)
            - Links without href or with generic text like "click here" (SC 2.4.4)
            - Links opening in new tabs without warning (SC 3.2.5)
            - Touch target size below 24x24px (SC 2.5.8 WCAG 2.2)
            - Missing skip navigation (SC 2.4.1)
            - Auto-playing or auto-rotating content without pause controls (SC 2.2.2)
            - Tables without proper headers (SC 1.3.1)
            - Missing language attributes (SC 3.1.1)

            ## How to Format Your Review

            For each issue found, post an inline review comment on the specific line with:

            1. The WCAG success criterion reference (e.g., "SC 1.1.1 - Non-text Content")
            2. A clear explanation of the accessibility barrier
            3. A code suggestion showing the fix using GitHub's suggestion syntax:
               ```suggestion
               corrected code here
               ```

            Use severity indicators:
            - 🔴 Critical: Makes content completely inaccessible (e.g., no alt text, no keyboard access)
            - 🟠 High: Significant barrier for assistive technology users
            - 🟡 Medium: Partial accessibility support, needs improvement
            - 🟢 Low: Best practice recommendation

            ## Important Rules

            - ONLY review for accessibility issues. Ignore code style, performance, or other concerns.
            - ONLY comment on changed lines (+ lines in the diff).
            - Every comment MUST reference a specific WCAG success criterion.
            - Every comment MUST include a ```suggestion block with the fix.
            - Submit your review as a "COMMENT" event type.
            - Do NOT comment on files that have no accessibility-relevant changes.
