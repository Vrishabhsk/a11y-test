name: URL Accessibility Scanner (Pa11y)

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Newline-delimited list of URLs to scan'
        required: true
        type: string
      standard:
        description: 'Accessibility standard to use'
        required: false
        type: choice
        default: 'WCAG2AA'
        options:
          - WCAG2A
          - WCAG2AA
          - WCAG2AAA

jobs:
  accessibility_scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'

      - name: Install Pa11y
        run: npm install -g pa11y

      - name: Create Pa11y config
        run: |
          cat > pa11y.json << 'EOF'
          {
            "chromeLaunchConfig": {
              "args": ["--no-sandbox", "--disable-setuid-sandbox"]
            }
          }
          EOF

      - name: Run Pa11y scans
        run: |
          while IFS= read -r url; do
            echo "Scanning: $url"
            pa11y --standard ${{ inputs.standard }} --config ./pa11y.json "$url"
            echo "---"
          done <<< "${{ inputs.urls }}"
