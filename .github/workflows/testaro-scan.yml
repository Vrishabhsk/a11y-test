name: Accessibility Scanner

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Newline-delimited list of URLs to scan'
        required: true
        type: string

jobs:
  accessibility_scan:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'

      - name: Create scanner script
        run: |
           cat > scan.js << 'SCRIPT'
           const { chromium } = require('playwright');
           const AxeBuilder = require('@axe-core/playwright').AxeBuilder;

           async function scanUrl(page, url) {
             console.log(`Scanning: ${url}`);
             try {
               await page.goto(url, { waitUntil: 'domcontentloaded', timeout: 30000 });
               await page.waitForLoadState('networkidle', { timeout: 10000 }).catch(() => {});
               
               const results = await new AxeBuilder({ page })
                 .withTags(['wcag2a', 'wcag2aa', 'wcag2aaa'])
                 .analyze();
               
               const violations = results.violations;
               const violationCount = violations.reduce((sum, v) => sum + v.nodes.length, 0);
               
               return {
                 url,
                 success: true,
                 violationCount,
                 violations: violations.map(v => ({
                   id: v.id,
                   impact: v.impact,
                   description: v.description,
                   help: v.help,
                   helpUrl: v.helpUrl,
                   nodes: v.nodes.length
                 }))
               };
             } catch (error) {
               return {
                 url,
                 success: false,
                 error: error.message
               };
             }
           }

           async function main() {
             const urls = process.env.URLS.split('\n').filter(u => u.trim());
             const browser = await chromium.launch();
             const allResults = [];
             let totalViolations = 0;

             for (const url of urls) {
               const context = await browser.newContext();
               const page = await context.newPage();
               const result = await scanUrl(page, url);
               allResults.push(result);
              
               if (result.success) {
                 totalViolations += result.violationCount;
                 if (result.violationCount > 0) {
                   console.log(`  Found ${result.violationCount} violations`);
                 } else {
                   console.log('  No violations found');
                 }
               } else {
                 console.log(`  Error: ${result.error}`);
               }
              
               await context.close();
             }

             await browser.close();

             // Generate HTML report
             const runId = process.env.RUN_ID;
             let html = `<!DOCTYPE html>
           <html>
           <head>
             <title>Accessibility Report - ${runId}</title>
             <style>
               body { font-family: system-ui, sans-serif; max-width: 1200px; margin: 0 auto; padding: 20px; }
               h1 { color: #333; }
               .summary { background: #f5f5f5; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
               .summary h2 { margin-top: 0; }
               .url { background: #fff; border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 5px; }
               .url.error { border-color: #c00; }
               .url h3 { margin-top: 0; word-break: break-all; }
               .pass { color: #0a0; font-weight: bold; }
               .fail { color: #c00; font-weight: bold; }
               .error { color: #900; }
               .violations { margin-top: 10px; }
               .violation { background: #fff8f8; padding: 10px; margin: 5px 0; border-left: 3px solid #c00; }
               .violation h4 { margin: 0 0 5px 0; }
               .violation .impact { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 12px; }
               .impact-critical { background: #c00; color: white; }
               .impact-serious { background: #c60; color: white; }
               .impact-moderate { background: #ca0; color: black; }
               .impact-minor { background: #08c; color: white; }
               a { color: #0366d6; }
             </style>
           </head>
           <body>
             <h1>Accessibility Scan Report</h1>
             <div class="summary">
               <h2>Summary</h2>
               <p><strong>Run ID:</strong> ${runId}</p>
               <p><strong>URLs scanned:</strong> ${urls.length}</p>
               <p><strong>Total violations:</strong> <span class="${totalViolations > 0 ? 'fail' : 'pass'}">${totalViolations}</span></p>
             </div>
           `;

             for (const result of allResults) {
               if (result.success) {
                 const statusClass = result.violationCount > 0 ? 'fail' : 'pass';
                 html += `
             <div class="url">
               <h3>${result.url}</h3>
               <p class="${statusClass}">${result.violationCount} violations found</p>`;

                 if (result.violations.length > 0) {
                   html += `<div class="violations">`;
                   for (const v of result.violations) {
                     html += `
                   <div class="violation">
                     <h4>${v.id} <span class="impact impact-${v.impact}">${v.impact}</span></h4>
                     <p>${v.description}</p>
                     <p><strong>Affected nodes:</strong> ${v.nodes}</p>
                     <p><a href="${v.helpUrl}" target="_blank">Learn more</a></p>
                   </div>`;
                   }
                   html += `</div>`;
                 }
                 html += `</div>`;
               } else {
                 html += `
             <div class="url error">
               <h3>${result.url}</h3>
               <p class="error">Error: ${result.error}</p>
             </div>`;
               }
             }

             html += `
           </body>
           </html>`;

             require('fs').writeFileSync('report.html', html);

             console.log(`\n=== Summary ===`);
             console.log(`Total violations: ${totalViolations}`);

             if (totalViolations > 0) {
               process.exit(1);
             }
           }

           main().catch(err => {
             console.error('Fatal error:', err);
             process.exit(1);
           });
           SCRIPT

      - name: Install dependencies
        run: |
          npm init -y
          npm install playwright @axe-core/playwright
          npx playwright install chromium

      - name: Run scanner
        env:
          URLS: ${{ inputs.urls }}
          RUN_ID: ${{ github.run_id }}
        run: node scan.js

      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: a11y-report-${{ github.run_id }}
          path: report.html
          retention-days: 30