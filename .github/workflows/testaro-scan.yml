name: Testaro Accessibility Scanner

on:
  workflow_dispatch:
    inputs:
      urls:
        description: 'Newline-delimited list of URLs to scan'
        required: true
        type: string

jobs:
  accessibility_scan:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'

      - name: Create scanner script
        run: |
           cat > scan.js << 'SCRIPT'
           const { run } = require('testaro');
           const fs = require('fs');

           async function main() {
             const urls = process.env.URLS.split('\n').filter(u => u.trim());
             const runId = process.env.RUN_ID;
             let totalViolations = 0;
             const reports = [];

             for (const url of urls) {
               console.log(`Scanning: ${url}`);
               
               const job = {
                 id: `scan-${runId}`,
                 what: 'Accessibility scan',
                 strict: true,
                 standard: 'only',
                 device: 'default',
                 browserID: 'chromium',
                 target: { url },
                 acts: [
                   { type: 'launch' },
                   { type: 'test', which: 'alfa' },
                   { type: 'test', which: 'aslint' },
                   { type: 'test', which: 'axe' },
                   { type: 'test', which: 'ed11y' },
                   { type: 'test', which: 'htmlcs' },
                   { type: 'test', which: 'ibm' },
                   { type: 'test', which: 'nuVal' },
                   { type: 'test', which: 'qualWeb' },
                   { type: 'test', which: 'testaro' }
                 ]
               };

               try {
                 const result = await run(job);
                 const totals = result.jobData?.totals || [0, 0, 0, 0];
                 const violations = totals.reduce((a, b) => a + b, 0);
                 
                 if (violations > 0) {
                   console.log(`VIOLATIONS FOUND in ${url}: ${violations}`);
                   totalViolations += violations;
                 } else {
                   console.log(`No violations in ${url}`);
                 }
                 
                 reports.push({ url, result, totals });
               } catch (error) {
                 console.error(`Error scanning ${url}:`, error.message);
                 reports.push({ url, error: error.message });
               }
             }

             // Generate HTML report
             let html = `<!DOCTYPE html>
           <html>
           <head>
             <title>Accessibility Report - ${runId}</title>
             <style>
               body { font-family: system-ui, sans-serif; max-width: 1200px; margin: 0 auto; padding: 20px; }
               h1 { color: #333; }
               .url { background: #f5f5f5; padding: 15px; margin: 10px 0; border-radius: 5px; }
               .violations { color: #c00; font-weight: bold; }
               .pass { color: #0a0; }
               .details { margin-top: 10px; font-size: 14px; }
               table { border-collapse: collapse; width: 100%; margin-top: 10px; }
               th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
               th { background: #f0f0f0; }
             </style>
           </head>
           <body>
             <h1>Accessibility Scan Report</h1>
             <p>Run ID: ${runId}</p>
             <p>Total URLs scanned: ${urls.length}</p>
             <p>Total violations: ${totalViolations}</p>
           `;

             for (const report of reports) {
               const hasError = report.error;
               const totals = report.totals || [0, 0, 0, 0];
               const violations = totals.reduce((a, b) => a + b, 0);
               
               html += `
             <div class="url">
               <h3>${report.url}</h3>
               ${hasError 
                 ? `<p class="violations">Error: ${report.error}</p>`
                 : violations > 0
                   ? `<p class="violations">${violations} violations found</p>
                      <table>
                        <tr><th>Critical</th><th>Serious</th><th>Moderate</th><th>Minor</th></tr>
                        <tr><td>${totals[0]}</td><td>${totals[1]}</td><td>${totals[2]}</td><td>${totals[3]}</td></tr>
                      </table>`
                   : `<p class="pass">No violations found</p>`
               }
             </div>`;
             }

             html += `
           </body>
           </html>`;

             fs.writeFileSync('report.html', html);

             if (totalViolations > 0) {
               console.log(`\nTOTAL VIOLATIONS: ${totalViolations}`);
               process.exit(1);
             }
             console.log('\nNo violations found');
           }

           main().catch(err => {
             console.error('Fatal error:', err);
             process.exit(1);
           });
           SCRIPT

      - name: Install Testaro and Playwright
        run: |
          npm init -y
          npm install testaro playwright
          npx playwright install chromium

      - name: Run scanner
        env:
          URLS: ${{ inputs.urls }}
          RUN_ID: ${{ github.run_id }}
        run: node scan.js

      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: a11y-report-${{ github.run_id }}
          path: report.html
          retention-days: 30