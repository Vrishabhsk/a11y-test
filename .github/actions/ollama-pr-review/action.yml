name: 'Ollama Code Review'
description: 'Request a code review from the Ollama server for a GitHub pull request.'

inputs:
  OLLAMA_API_URL:
    description: 'Ollama server endpoint'
    required: true
    default: 'http://localhost:11434'
  MY_GITHUB_TOKEN:
    description: 'GitHub authentication token'
    required: true
  OWNER:
    description: 'Repository owner'
    required: true
  REPO:
    description: 'Repository name'
    required: true
  PR_NUMBER:
    description: 'Pull request number'
    required: true
  CUSTOM_PROMPT:
    description: 'Optional review instructions'
    required: false
    default: ''
  RESPONSE_LANGUAGE:
    description: 'Output language preference'
    required: false
    default: 'English'
  MODEL:
    description: 'Review model selection'
    required: false
    default: 'deepseek-r1:8b'
  TRANSLATION_MODEL:
    description: 'Translation model'
    required: false
    default: 'exaone3.5:7.8b'

branding:
  icon: 'check'
  color: 'blue'

runs:
  using: 'composite'
  steps:
    - name: 'Install dependencies'
      shell: bash
      run: pip install requests>=2.31.0 pydantic>=2.10.6

    - name: 'Run Ollama Code Review'
      shell: bash
      env:
        OLLAMA_API_URL: ${{ inputs.OLLAMA_API_URL }}
        MY_GITHUB_TOKEN: ${{ inputs.MY_GITHUB_TOKEN }}
        OWNER: ${{ inputs.OWNER }}
        REPO: ${{ inputs.REPO }}
        PR_NUMBER: ${{ inputs.PR_NUMBER }}
        CUSTOM_PROMPT: ${{ inputs.CUSTOM_PROMPT }}
        RESPONSE_LANGUAGE: ${{ inputs.RESPONSE_LANGUAGE }}
        MODEL: ${{ inputs.MODEL }}
        TRANSLATION_MODEL: ${{ inputs.TRANSLATION_MODEL }}
      run: python ${{ github.action_path }}/src/ollama_review.py
