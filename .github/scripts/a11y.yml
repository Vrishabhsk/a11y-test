name: Accessibility Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # Job 1: Lint code for accessibility issues using eslint-plugin-jsx-a11y
  eslint-a11y:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run ESLint with jsx-a11y
        run: npm run lint
        
      - name: Check for a11y violations
        run: |
          npm run lint -- --max-warnings=0 || exit 1

  # Job 2: Run component accessibility tests with jest-axe
  jest-axe-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run component a11y tests
        run: npm test -- --coverage
