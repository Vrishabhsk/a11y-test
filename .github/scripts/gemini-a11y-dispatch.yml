name: '♿ Gemini A11y Dispatch'

on:
  pull_request:
    branches: [ main, master ]
    types: [ opened, reopened, synchronize ]
  issue_comment:
    types: [ created ]

concurrency:
  group: '${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.event.issue.number }}'
  cancel-in-progress: true

defaults:
  run:
    shell: 'bash'

jobs:
  dispatch:
    runs-on: 'ubuntu-latest'
    timeout-minutes: 5
    permissions:
      contents: 'read'
      id-token: 'write'
      issues: 'write'
      pull-requests: 'write'
    if: |-
      (
        github.event_name == 'pull_request'
        && github.event.pull_request.head.repo.fork == false
      ) || (
        github.event_name == 'issue_comment'
        && github.event.issue.pull_request
        && github.event.issue.pull_request.head.repo.fork == false
        && contains(github.event.comment.body, '@gemini-cli /a11y-review')
      )
    steps:
      - name: 'Mint identity token'
        id: 'mint_identity_token'
        if: '${{ vars.APP_ID }}'
        uses: 'actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf'
        with:
          app-id: '${{ vars.APP_ID }}'
          private-key: '${{ secrets.APP_PRIVATE_KEY }}'
          permission-contents: 'read'
          permission-issues: 'write'
          permission-pull-requests: 'write'

      - name: 'Checkout repository'
        uses: 'actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8'

      - name: 'Parse comment for additional context'
        id: 'parse_comment'
        if: |-
          github.event_name == 'issue_comment'
        run: |-
          COMMENT_BODY='${{ github.event.comment.body }}'
          # Remove the trigger command and extract additional context
          ADDITIONAL_CONTEXT=$(echo "$COMMENT_BODY" | sed 's/@gemini-cli \/a11y-review//g' | xargs)
          echo "additional_context=$ADDITIONAL_CONTEXT" >> $GITHUB_OUTPUT

      - name: 'Trigger A11y Review'
        uses: 'google-github-actions/run-gemini-cli@v0'
        id: 'gemini_dispatch'
        env:
          GITHUB_TOKEN: '${{ steps.mint_identity_token.outputs.token || secrets.GITHUB_TOKEN || github.token }}'
          PULL_REQUEST_NUMBER: '${{ github.event.pull_request.number || github.event.issue.number }}'
          REPOSITORY: '${{ github.repository }}'
          GEMINI_API_KEY: '${{ secrets.GEMINI_API_KEY }}'
        with:
          gcp_location: '${{ vars.GOOGLE_CLOUD_LOCATION }}'
          gcp_project_id: '${{ vars.GOOGLE_CLOUD_PROJECT }}'
          gcp_service_account: '${{ vars.SERVICE_ACCOUNT_EMAIL }}'
          gcp_workload_identity_provider: '${{ vars.GCP_WIF_PROVIDER }}'
          gemini_api_key: '${{ secrets.GEMINI_API_KEY }}'
          gemini_cli_version: '${{ vars.GEMINI_CLI_VERSION }}'
          gemini_debug: '${{ fromJSON(vars.GEMINI_DEBUG || vars.ACTIONS_STEP_DEBUG || false) }}'
          gemini_model: '${{ vars.GEMINI_MODEL }}'
          google_api_key: '${{ secrets.GOOGLE_API_KEY }}'
          use_gemini_code_assist: '${{ vars.GOOGLE_GENAI_USE_GCA }}'
          use_vertex_ai: '${{ vars.GOOGLE_GENAI_USE_VERTEXAI }}'
          upload_artifacts: '${{ vars.UPLOAD_ARTIFACTS }}'
          workflow_name: 'gemini-a11y-dispatch'
          github_pr_number: '${{ github.event.pull_request.number }}'
          settings: |-
            {
              "model": {
                "maxSessionTurns": 25
              },
              "telemetry": {
                "enabled": true,
                "target": "local",
                "outfile": ".gemini/telemetry.log"
              },
              "mcpServers": {
                "github": {
                  "command": "docker",
                  "args": [
                    "run",
                    "-i",
                    "--rm",
                    "-e",
                    "GITHUB_PERSONAL_ACCESS_TOKEN",
                    "ghcr.io/github/github-mcp-server:v0.27.0"
                  ],
                  "includeTools": [
                    "add_comment_to_pending_review",
                    "pull_request_read",
                    "pull_request_review_write"
                  ],
                  "env": {
                    "GITHUB_PERSONAL_ACCESS_TOKEN": "${GITHUB_TOKEN}"
                  }
                }
              },
              "tools": {
                "core": [
                  "run_shell_command(cat)",
                  "run_shell_command(echo)",
                  "run_shell_command(grep)",
                  "run_shell_command(head)",
                  "run_shell_command(tail)"
                ]
              }
            }
          extensions: |
            [
              "https://github.com/gemini-cli-extensions/code-review"
            ]
          prompt: '/a11y-review'
