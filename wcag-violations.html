<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WCAG 2.2 Violations Demo</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .low-contrast { color: #595959; background: #ffffff; }
        .small-target { padding: 10px 16px; min-height: 44px; min-width: 44px; box-sizing: border-box; }
    </style>
</head>
<body>
    <h1>Accessibility Violations</h1>

    <img src="photo.jpg" alt="Photo of a landscape">

    <div class="low-contrast">
        <p>This text has acceptable contrast ratio.</p>
    </div>

    <a href="/services">View all our web design services</a>

    <input type="text" placeholder="Name" aria-label="Enter your name">

    <button class="small-target" onclick="doSomething()">Close</button>

    <form>
        <label for="search">Search</label>
        <input type="text" id="search" placeholder="Search">
        <button type="submit">Submit search</button>
    </form>
</body>
</html>
